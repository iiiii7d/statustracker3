name: Format, Lint
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true
      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 25.8.1
          cache: "pnpm"
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.local/share/pnpm
            **/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - run: pnpm i
      - run: pnpm format

      - run: echo "message=format @ $(date +%Y%m%dT%H:%M:%S%Z)" >> "$GITHUB_ENV"
        if: github.event_name != 'pull_request'
      - uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10.0.0
        if: github.event_name != 'pull_request'
        with:
          default_author: github_actions
          message: ${{ env.message }}
      - run: git status
        if: github.event_name == 'pull_request'

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      security-events: write
      actions: read
    needs: format

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 25.8.1
          cache: "pnpm"
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.local/share/pnpm
            **/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3

      - run: pnpm i
      - run: pnpm run lint:sarif | tail -n +4 | tee ${{ runner.temp }}/eslint.sarif
      - run: pnpm run type-check
        if: "!cancelled()"

      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile
          format: sarif
          no-fail: true
          output-file: "${{ runner.temp }}/hadolint.sarif"

      - uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        if: "!cancelled()"
        with:
          sarif_file: ${{ runner.temp }}/hadolint.sarif
          category: hadolint
      - uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        if: "!cancelled()"
        with:
          sarif_file: ${{ runner.temp }}/eslint.sarif
          category: eslint

      - run: echo "message=lint @ $(date +%Y%m%dT%H:%M:%S%Z)" >> "$GITHUB_ENV"
        if: github.ref_name == 'dev' && !cancelled()
      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        if: github.ref_name == 'dev' && !cancelled()
        with:
          commit-message: ${{ env.message }}
          branch: lint
          title: Linting
      - run: git status
        if: github.ref_name != 'dev' && !cancelled()
